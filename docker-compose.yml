# Docker Compose for Agentic Hybrid RAG Engine
version: "3.9"

services:
  rag-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-engine
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Mount Data folder so PDFs can be updated without rebuilding
      - ./Data:/app/Data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
