# ============================================================
# CI/CD Pipeline for Agentic Hybrid RAG Engine
# ============================================================
# Triggers:
#   - Push to main branch
#   - Pull requests to main branch
#
# Jobs:
#   1. lint-and-test   → Install deps, run pytest unit tests
#   2. evaluate-rag    → Run DeepEval metrics (manual trigger only)
#   3. docker-build    → Build & push Docker image to GHCR
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger for evaluation

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: LINT & UNIT TESTS
  # ─────────────────────────────────────────────────────────
  lint-and-test:
    name: 🧪 Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 🔧 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: ✅ Run Unit Tests
        env:
          # Dummy keys so modules can import without crashing
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'dummy-key-for-ci' }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY || 'dummy-key-for-ci' }}
        run: |
          python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────
  # JOB 2: RAG EVALUATION (Manual Only)
  # ─────────────────────────────────────────────────────────
  evaluate-rag:
    name: 📊 DeepEval RAG Evaluation
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 🔧 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run DeepEval Evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          python evaluate_rag.py

  # ─────────────────────────────────────────────────────────
  # JOB 3: DOCKER BUILD & PUSH
  # ─────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-engine:latest
            ghcr.io/${{ github.repository_owner }}/rag-engine:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
